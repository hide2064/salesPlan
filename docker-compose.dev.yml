version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sales_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-sales_plan}
      MYSQL_USER: ${DB_USER:-salesuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-salespass}
    ports:
      - "3307:3306"  # ホスト3307→コンテナ3306 (ローカルMySQL 3306 との競合回避)
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='+09:00'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: sales_server
    volumes:
      - ./server/src:/app/src
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-salesuser}
      DB_PASSWORD: ${DB_PASSWORD:-salespass}
      DB_NAME: ${DB_NAME:-sales_plan}
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: sales_client
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mysql_data:
